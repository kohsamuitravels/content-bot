name: Koh Samui Content Bot 🌴
on:
  schedule:
    # ══════════════════════════════════════════════
    # מצב BURST — 20 פעמים ביום (40 מאמרים ב-48 שעות)
    # ══════════════════════════════════════════════
    - cron: '0 0 * * *'
    - cron: '12 1 * * *'
    - cron: '24 2 * * *'
    - cron: '36 3 * * *'
    - cron: '48 4 * * *'
    - cron: '0 6 * * *'
    - cron: '12 7 * * *'
    - cron: '24 8 * * *'
    - cron: '36 9 * * *'
    - cron: '48 10 * * *'
    - cron: '0 12 * * *'
    - cron: '12 13 * * *'
    - cron: '24 14 * * *'
    - cron: '36 15 * * *'
    - cron: '48 16 * * *'
    - cron: '0 18 * * *'
    - cron: '12 19 * * *'
    - cron: '24 20 * * *'
    - cron: '36 21 * * *'
    - cron: '48 22 * * *'
    # NORMAL MODE (3 פעמים ביום — שחרר את השורות האלה אחרי 48 שעות)
    # - cron: '0 3 * * *'
    # - cron: '0 10 * * *'
    # - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'נושא ספציפי (אופציונלי)'
        required: false
        default: ''
      category:
        description: 'קטגוריה (beaches/attractions/food/transport/lifestyle/spa/itinerary/practical)'
        required: false
        default: ''

jobs:
  publish-article:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./scripts

      - name: Generate & Publish Article
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          AGODA_SITE_ID: ${{ secrets.AGODA_SITE_ID }}
          AGODA_API_KEY: ${{ secrets.AGODA_API_KEY }}
          VIATOR_API_KEY: ${{ secrets.VIATOR_API_KEY }}
          VIATOR_PARTNER_ID: ${{ secrets.VIATOR_PARTNER_ID }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic }}
          CATEGORY_OVERRIDE: ${{ github.event.inputs.category }}
        run: node generate-and-publish.js
        working-directory: ./scripts

      - name: Save published.json to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/published.json || true
          git diff --staged --quiet || git commit -m "📝 עדכון published.json"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-log-${{ github.run_id }}
          path: scripts/last-run.log
          retention-days: 7
